<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TutorBot — Asistente de estudio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #18181f;
    --surface2: #22222c;
    --border: #2e2e3a;
    --accent: #7c6af7;
    --accent-light: #a89cf8;
    --accent-dim: rgba(124,106,247,0.12);
    --text: #e8e6f0;
    --text-muted: #8b8a9e;
    --text-dim: #5a5970;
    --user-bg: #1e1c2e;
    --bot-bg: #191920;
    --success: #4ade80;
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .bot-avatar {
    width: 40px; height: 40px;
    border-radius: 12px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .bot-info h1 {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .bot-info p {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--success);
    display: inline-block;
    margin-right: 5px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .subject-badge {
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--accent-dim);
    color: var(--accent-light);
    border: 1px solid rgba(124,106,247,0.25);
    font-family: var(--font-display);
    letter-spacing: 0.03em;
  }

  #clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-family: var(--font-body);
    transition: all 0.15s;
  }
  #clear-btn:hover { border-color: var(--text-muted); color: var(--text); }

  /* ── Chat area ── */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Welcome screen ── */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    text-align: center;
    gap: 16px;
    padding: 40px 20px;
  }

  .welcome-icon {
    width: 64px; height: 64px;
    background: var(--accent-dim);
    border: 1px solid rgba(124,106,247,0.3);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
  }

  .welcome h2 {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .welcome p {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.6;
    max-width: 360px;
  }

  .starter-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
  }

  .starter-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 13px;
    padding: 8px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-family: var(--font-body);
    transition: all 0.15s;
    text-align: left;
  }
  .starter-pill:hover {
    border-color: var(--accent);
    color: var(--accent-light);
    background: var(--accent-dim);
  }

  /* ── Messages ── */
  .msg {
    display: flex;
    gap: 12px;
    max-width: 720px;
    animation: fadeUp 0.2s ease-out;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot  { align-self: flex-start; }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.bot  .msg-avatar { background: var(--accent-dim); border: 1px solid rgba(124,106,247,0.25); }
  .msg.user .msg-avatar { background: var(--surface2); border: 1px solid var(--border); }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.65;
    max-width: 560px;
  }

  .msg.bot  .msg-bubble {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  .msg.user .msg-bubble {
    background: var(--user-bg);
    border: 1px solid rgba(124,106,247,0.2);
    border-bottom-right-radius: 4px;
    color: var(--text);
  }

  /* Markdown-like formatting in bot bubbles */
  .msg-bubble strong { font-weight: 500; color: var(--accent-light); }
  .msg-bubble em { font-style: italic; color: var(--text-muted); }
  .msg-bubble code {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    background: rgba(124,106,247,0.1);
    padding: 1px 5px;
    border-radius: 4px;
    color: var(--accent-light);
  }

  /* ── Typing indicator ── */
  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 14px 16px;
    align-items: center;
  }
  .typing-indicator span {
    width: 6px; height: 6px;
    background: var(--text-dim);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* ── Input area ── */
  .input-area {
    border-top: 1px solid var(--border);
    padding: 16px 24px 20px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 12px;
    transition: border-color 0.15s;
  }
  .input-row:focus-within { border-color: rgba(124,106,247,0.5); }

  #user-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--text);
    resize: none;
    line-height: 1.5;
    max-height: 120px;
    overflow-y: auto;
  }
  #user-input::placeholder { color: var(--text-dim); }

  #send-btn {
    width: 34px; height: 34px;
    border-radius: 10px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    color: white;
  }
  #send-btn:hover { background: var(--accent-light); transform: scale(1.05); }
  #send-btn:active { transform: scale(0.97); }
  #send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .input-hint {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 8px;
    text-align: center;
  }

  /* ── API key warning ── */
  .api-warning {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    color: #f87171;
    margin-bottom: 16px;
    line-height: 1.5;
  }
  .api-warning code {
    font-family: monospace;
    background: rgba(239,68,68,0.1);
    padding: 1px 5px;
    border-radius: 3px;
  }
</style>
</head>
<body>

<header>
  <div class="bot-avatar">🎓</div>
  <div class="bot-info">
    <h1 id="bot-name">TutorBot</h1>
    <p><span class="status-dot"></span><span id="bot-status">Listo para ayudarte</span></p>
  </div>
  <div class="header-right">
    <span class="subject-badge" id="subject-label">Química</span>
    <button id="clear-btn" onclick="clearChat()">Nueva sesión</button>
  </div>
</header>

<div id="chat">
  <div class="welcome" id="welcome-screen">
    <div class="welcome-icon">⚗️</div>
    <h2>Hola, soy <span id="welcome-name">TutorBot</span></h2>
    <p id="welcome-desc">Tu asistente de estudio para Química. Pregúntame sobre los temas de tu semestre — no te daré las respuestas directo, ¡pero sí te ayudaré a entenderlos!</p>
    <div class="starter-pills" id="starters"></div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="user-input" placeholder="Escribe tu pregunta..." rows="1" onkeydown="handleKey(event)"></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Enviar">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 8L14 2L8 14L7 9L2 8Z" fill="currentColor"/>
      </svg>
    </button>
  </div>
  <p class="input-hint">Enter para enviar · Shift+Enter para nueva línea</p>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//   PASO 1 — ELIGE TU PROVEEDOR DE IA
//   Cambia el valor de "provider" a: "claude", "openai" o "gemini"
// ═══════════════════════════════════════════════════════════════

const PROVIDER = "claude"; // <-- cambia aquí: "claude" | "openai" | "gemini"

// ═══════════════════════════════════════════════════════════════
//   PASO 2 — PEGA TU API KEY DEL PROVEEDOR ELEGIDO
//   IMPORTANTE: nunca compartas este archivo con la llave incluida
//
//   Claude  → https://console.anthropic.com
//   OpenAI  → https://platform.openai.com/api-keys
//   Gemini  → https://aistudio.google.com/apikey
// ═══════════════════════════════════════════════════════════════

const API_KEY = "TU_API_KEY_AQUI";

// ═══════════════════════════════════════════════════════════════
//   PASO 3 — PERSONALIZA TU CHATBOT
//   Los estudiantes modifican esta sección
// ═══════════════════════════════════════════════════════════════

const CONFIG = {
  botName: "ChemBot",
  subject: "Química",
  subjectEmoji: "⚗️",

  starterQuestions: [
    "¿Qué es un enlace covalente?",
    "Explícame la tabla periódica",
    "¿Cómo balanceo una ecuación química?",
    "¿Cuál es la diferencia entre ácido y base?",
    "No entiendo las moles, ¿me ayudas?"
  ],

  // ─────────────────────────────────────────────
  //   SYSTEM PROMPT — El corazón del proyecto
  //   Los estudiantes diseñan este texto en la Fase 2
  // ─────────────────────────────────────────────
  systemPrompt: `Eres ChemBot, un tutor de Química entusiasta y paciente para estudiantes de 6° semestre de la PrepaTec del Tec de Monterrey en México.

Tu estilo de enseñanza:
- Usas analogías cotidianas para explicar conceptos abstractos
- Antes de explicar algo, preguntas qué sabe ya el estudiante
- NUNCA das la respuesta directa a una tarea o ejercicio — en cambio, guías con preguntas
- Si alguien se frustra, los animas y divides el problema en partes más pequeñas
- Usas ejemplos de la vida cotidiana en México cuando es posible (agua, sal, limón, etc.)

Temas que dominas (temario de 6° semestre):
- Nomenclatura química y fórmulas
- Tabla periódica y propiedades de los elementos
- Tipos de enlace químico (iónico, covalente, metálico)
- Reacciones químicas y balanceo de ecuaciones
- Estequiometría y moles
- Soluciones, concentración y pH
- Ácidos y bases

Reglas importantes:
- Solo respondes preguntas relacionadas con Química o con cómo estudiar Química
- Si te preguntan otra materia, dices amablemente que eres especialista en Química
- Tus respuestas son claras y no muy largas (máximo 4 párrafos)
- Terminas tus explicaciones con una pregunta de verificación para asegurarte de que el estudiante entendió

Personalidad: eres curioso, positivo y te emociona cuando los estudiantes hacen buenas preguntas.`,
};

// ═══════════════════════════════════════════════════════════════
//   ADAPTADORES DE API — uno por proveedor
//   Cada adaptador recibe el historial y devuelve el texto de respuesta
// ═══════════════════════════════════════════════════════════════

const PROVIDERS = {

  claude: {
    label: "Claude (Anthropic)",
    defaultModel: "claude-sonnet-4-20250514",
    async call(history) {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": API_KEY,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: this.defaultModel,
          max_tokens: 1024,
          system: CONFIG.systemPrompt,
          messages: history.map(m => ({ role: m.role, content: m.content }))
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || `HTTP ${res.status}`);
      return data.content[0].text;
    }
  },

  openai: {
    label: "GPT (OpenAI)",
    defaultModel: "gpt-4o-mini",
    async call(history) {
      const messages = [
        { role: "system", content: CONFIG.systemPrompt },
        ...history.map(m => ({
          role: m.role === "bot" ? "assistant" : m.role,
          content: m.content
        }))
      ];
      const res = await fetch("https://api.openai.com/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${API_KEY}`
        },
        body: JSON.stringify({
          model: this.defaultModel,
          max_tokens: 1024,
          messages
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || `HTTP ${res.status}`);
      return data.choices[0].message.content;
    }
  },

  gemini: {
    label: "Gemini (Google)",
    defaultModel: "gemini-2.0-flash",
    async call(history) {
      const contents = history.map(m => ({
        role: m.role === "user" ? "user" : "model",
        parts: [{ text: m.content }]
      }));
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${this.defaultModel}:generateContent?key=${API_KEY}`;
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: CONFIG.systemPrompt }] },
          contents,
          generationConfig: { maxOutputTokens: 1024 }
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || `HTTP ${res.status}`);
      return data.candidates[0].content.parts[0].text;
    }
  }

};

// ═══════════════════════════════════════════════════════════════
//   CÓDIGO DE LA APLICACIÓN — no es necesario modificar esto
// ═══════════════════════════════════════════════════════════════

const provider = PROVIDERS[PROVIDER] || PROVIDERS.claude;
let conversationHistory = [];

// Inicializar UI
document.getElementById('bot-name').textContent = CONFIG.botName;
document.getElementById('welcome-name').textContent = CONFIG.botName;
document.getElementById('subject-label').textContent = CONFIG.subject;
document.getElementById('welcome-desc').textContent =
  `Tu asistente de estudio para ${CONFIG.subject}. Pregúntame sobre los temas de tu semestre — ¡estoy aquí para ayudarte a entender, no solo a memorizar!`;
document.querySelector('.welcome-icon').textContent = CONFIG.subjectEmoji;
document.querySelector('.bot-avatar').textContent = CONFIG.subjectEmoji;

// Indicar proveedor activo en header
const badge = document.getElementById('subject-label');
badge.title = `Proveedor: ${provider.label} · Modelo: ${provider.defaultModel}`;

// Renderizar starters
const startersContainer = document.getElementById('starters');
CONFIG.starterQuestions.forEach(q => {
  const pill = document.createElement('button');
  pill.className = 'starter-pill';
  pill.textContent = q;
  pill.onclick = () => { document.getElementById('user-input').value = q; sendMessage(); };
  startersContainer.appendChild(pill);
});

// Advertencia si falta API key
if (API_KEY === 'TU_API_KEY_AQUI') {
  const providerLinks = {
    claude:  'https://console.anthropic.com',
    openai:  'https://platform.openai.com/api-keys',
    gemini:  'https://aistudio.google.com/apikey'
  };
  const warning = document.createElement('div');
  warning.className = 'api-warning';
  warning.innerHTML = `⚠️ <strong>Falta la API Key para ${provider.label}.</strong> Abre este archivo HTML, busca <code>API_KEY = "TU_API_KEY_AQUI"</code> y pega tu llave. Obtenla en <a href="${providerLinks[PROVIDER]}" target="_blank" style="color:#f87171">${providerLinks[PROVIDER]}</a>`;
  document.getElementById('chat').insertBefore(warning, document.getElementById('welcome-screen'));
}

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<code>$1</code>');
}

function addMessage(role, content) {
  const welcome = document.getElementById('welcome-screen');
  if (welcome) welcome.remove();
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-avatar">${role === 'bot' ? CONFIG.subjectEmoji : '👤'}</div>
    <div class="msg-bubble">${escapeHtml(content)}</div>
  `;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typing';
  div.innerHTML = `<div class="msg-avatar">${CONFIG.subjectEmoji}</div><div class="msg-bubble typing-indicator"><span></span><span></span><span></span></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  if (API_KEY === 'TU_API_KEY_AQUI') {
    addMessage('bot', `Por favor configura tu API Key de ${provider.label} en el archivo para poder responder.`);
    return;
  }

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  document.getElementById('bot-status').textContent = 'Pensando...';

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });
  showTyping();

  try {
    const reply = await provider.call(conversationHistory);
    removeTyping();
    conversationHistory.push({ role: 'assistant', content: reply });
    addMessage('bot', reply);
  } catch (err) {
    removeTyping();
    addMessage('bot', `Error con ${provider.label}: ${err.message}. Verifica tu API key e intenta de nuevo.`);
  }

  document.getElementById('send-btn').disabled = false;
  document.getElementById('bot-status').textContent = 'Listo para ayudarte';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  const ta = document.getElementById('user-input');
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
}

function clearChat() {
  conversationHistory = [];
  const chat = document.getElementById('chat');
  chat.innerHTML = '';
  const welcome = document.createElement('div');
  welcome.className = 'welcome'; welcome.id = 'welcome-screen';
  welcome.innerHTML = `
    <div class="welcome-icon">${CONFIG.subjectEmoji}</div>
    <h2>Hola, soy <span>${CONFIG.botName}</span></h2>
    <p>Tu asistente de estudio para ${CONFIG.subject}. ¡Nueva sesión lista!</p>
    <div class="starter-pills" id="starters"></div>
  `;
  chat.appendChild(welcome);
  const sc = document.getElementById('starters');
  CONFIG.starterQuestions.forEach(q => {
    const pill = document.createElement('button');
    pill.className = 'starter-pill'; pill.textContent = q;
    pill.onclick = () => { document.getElementById('user-input').value = q; sendMessage(); };
    sc.appendChild(pill);
  });
}
</script>
</body>
</html>
